name: Build Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: MetaMask upstream tag to build
        required: false
  repository_dispatch:
    types:
      - build-upstream-release

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    concurrency:
      group: build-release-${{ github.event.client_payload.upstream_tag || inputs.upstream_tag || 'latest' }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI entrypoints
        run: pnpm run build

      - name: Resolve target tag
        id: resolve-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TARGET_TAG="${{ github.event.client_payload.upstream_tag }}"
          if [ -z "$TARGET_TAG" ]; then
          TARGET_TAG="${{ inputs.upstream_tag }}"
          fi
          if [ -z "$TARGET_TAG" ]; then
            TARGET_TAG=$(node dist/cli/resolve-upstream-tag.js)
          fi
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

      - name: Check whether release build is needed
        id: release-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          node dist/cli/check-for-upstream-release.js --tag "${{ steps.resolve-tag.outputs.target_tag }}" > release-check.json
          SHOULD_BUILD=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('release-check.json','utf8')); process.stdout.write(String(data.shouldBuild));")
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        if: steps.release-check.outputs.should_build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
        run: node dist/cli/build-release.js --tag "${{ steps.resolve-tag.outputs.target_tag }}" > build-output.json

      - name: Materialize release metadata files
        id: release-assets
        if: steps.release-check.outputs.should_build == 'true'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('build-output.json', 'utf8'));
          const assetPaths = data.publishPlan.assetPaths;
          const manifestPath = assetPaths.find((value) => value.endsWith('release-manifest.json'));
          const checksumsPath = assetPaths.find((value) => value.endsWith('SHA256SUMS.txt'));
          const zipPaths = assetPaths.filter((value) => value.endsWith('.zip'));

          if (!manifestPath || !checksumsPath || zipPaths.length === 0) {
            throw new Error('build-output.json did not contain the expected release asset paths');
          }

          fs.copyFileSync(manifestPath, 'release-manifest.json');
          fs.copyFileSync(checksumsPath, 'SHA256SUMS.txt');

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `attestation_subject_path<<EOF\n${zipPaths.join('\n')}\nEOF\n`);
          NODE

      - name: Attest release artifacts
        id: attest-release-assets
        if: steps.release-check.outputs.should_build == 'true'
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.release-assets.outputs.attestation_subject_path }}

      - name: Upload workflow artifacts
        if: steps.release-check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: build-release-output
          path: |
            build-output.json
            release-manifest.json
            SHA256SUMS.txt

      - name: Publish GitHub release
        if: steps.release-check.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node dist/cli/publish-release.js --build-output build-output.json

      - name: Report skipped release
        if: steps.release-check.outputs.should_build != 'true'
        run: echo "Release ${{ steps.resolve-tag.outputs.target_tag }} is already present and valid; skipping rebuild."
